name: Release
on:
  push:
    branches:
      - main
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Dependencies
        run: yarn --frozen-lockfile
      - name: Build
        run: yarn build
      - name: Release to Github and NPM
        id: release
        uses: cycjimmy/semantic-release-action@v4.1.0
        with:
          branches: |
            [
              'main'
            ]
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        timeout-minutes: 10
      - name: Trigger MyFinance rebuild
        if: steps.release.outputs.new_release_published == 'true'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.MYFINANCE_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/yanivfranco/MyFinance/dispatches \
            -d '{"event_type":"importer-updated","client_payload":{"version":"${{ steps.release.outputs.new_release_version }}"}}'
permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
